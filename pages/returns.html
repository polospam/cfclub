        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #f2f2f2; font-weight: bold; text-align: center; }
        .index-header { background-color: #e0e0e0; text-align: left; }
        .year-header { background-color: #c0c0c0; text-align: center; font-weight: bold; }
        .annual { background-color: #ffe0b2; font-weight: bold; }
        .positive { color: green; }
        .negative { color: red; }
        .current-year { background-color: #e6f7ff; }
        .ytd { font-style: italic; }
    </style>

        /**
         * Calculates the compounded return from an array of monthly returns.
         */
        function calculateCompoundedReturn(returns) {
            const validReturns = returns.filter(r => r !== null && r !== undefined);
            if (validReturns.length === 0) return null;
            const cumulativeFactor = validReturns.reduce((acc, r) => acc * (1 + r / 100), 1);
            return (cumulativeFactor - 1) * 100;
        }

        /**
         * Formats a return value with color coding and percentage sign.
         */
        function formatReturn(value, isAnnual = false) {
            if (value === null || value === undefined) {
                return `<td class="${isAnnual ? 'annual' : ''}">-</td>`;
            }
            const fixedValue = value.toFixed(1);
            const className = value >= 0 ? 'positive' : 'negative';
            const extraClass = isAnnual ? 'annual' : '';
            return `<td class="${className} ${extraClass}">${fixedValue}%</td>`;
        }

        /**
         * Generates the HTML table based on the start and end year filter.
         */
        function generateReturnsTable() {
            const startYearInput = document.getElementById('startYear');
            const endYearInput = document.getElementById('endYear');
            
            const startYear = parseInt(startYearInput.value);
            const endYear = parseInt(endYearInput.value);

            if (isNaN(startYear) || isNaN(endYear) || startYear > endYear || startYear < 2000 || endYear > 2026) {
                document.getElementById('returns-table-container').innerHTML = '<p style="color:red;">Invalid year range. Please enter a valid start and end year (2000-2026), where start year is less than or equal to end year.</p>';
                return;
            }

            let html = '<table><thead>';
            
            const allYears = Object.keys(data).map(Number).sort((a, b) => a - b);
            const filteredYears = allYears.filter(year => year >= startYear && year <= endYear).map(String);
            
            const lastYearInData = allYears[allYears.length - 1].toString();
            const maxMonths = ALL_MONTHS.length;

            html += '<tr><th class="year-header" rowspan="2"></th>';
            html += '<th class="index-header" rowspan="2"></th>';
            
            ALL_MONTHS.forEach(month => {
                html += `<th colspan="1">${month}</th>`;
            });
            html += '<th class="annual" rowspan="2">Annual</th></tr></thead><tbody>';

            filteredYears.forEach(year => {
                const yearData = data[year];
                const isCurrentYear = year === lastYearInData;

                indices.forEach((index, i) => {
                    const returns = yearData[index] || [];
                    
                    // Use pre-computed annual return if available, otherwise calculate
                    const yearAnnual = annualReturns[year] && annualReturns[year][index];
                    const compoundedReturn = yearAnnual !== null && yearAnnual !== undefined
                        ? yearAnnual
                        : calculateCompoundedReturn(returns);
                    
                    const isYTD = isCurrentYear && returns.some(r => r === null || r === undefined);
                    
                    html += `<tr class="${isCurrentYear ? 'current-year' : ''}">`;

                    if (i === 0) {
                        html += `<td class="year-header" rowspan="${indices.length}">${year}</td>`;
                    }

                    html += `<td class="index-header">${displayNames[index]}</td>`;

                    for (let monthIndex = 0; monthIndex < maxMonths; monthIndex++) {
                        const monthlyReturn = returns[monthIndex];
                        html += formatReturn(monthlyReturn);
                    }

                    html += formatReturn(compoundedReturn, true);
                    
                    html += '</tr>';
                });
                
                if (isCurrentYear) {
                    html += `<tr><td colspan="${maxMonths + 3}" class="ytd" style="text-align:center;">* Annual return for ${year} is calculated as YTD (Year-to-Date) based on available data.</td></tr>`;
                }
            });

            html += '</tbody></table>';
            document.getElementById('returns-table-container').innerHTML = html;
        }

        /**
         * Calculates probability of monthly returns > threshold
         */
        function probAbove(returnsArray, threshold) {
            const count = returnsArray.filter(r => r > threshold).length;
            return (count / returnsArray.length * 100).toFixed(1) + '%';
        }

        /**
         * Adds probability of monthly returns > threshold rows to the table
         */
        function addMonthlyRetProbsToTable() {
            const returns = { sp500: [], djia: [], nasdaq: [] };
            for (const year in data) {
                const y = data[year];
                indices.forEach(idx => {
                    if (y[idx]) {
                        y[idx].forEach(r => {
                            if (r !== null && r !== undefined) {
                                returns[idx].push(r);
                            }
                        });
                    }
                });
            }
            const tbody = document.querySelector('#probTable tbody');
            const idxList = [
                { name: 'SPY', key: 'sp500' },
                { name: 'DIA', key: 'djia' },
                { name: 'QQQ', key: 'nasdaq' }
            ];

            idxList.forEach(idx => {
                const row = document.createElement('tr');
                row.innerHTML = `<td><strong>${idx.name}</strong></td>`;
                thresholds.forEach(t => {
                    const prob = probAbove(returns[idx.key], t);
                    row.innerHTML += `<td class="prob">${prob}</td>`;
                });
                tbody.appendChild(row);
            });
        }

        // Initial table load
        document.addEventListener('DOMContentLoaded', generateReturnsTable);
        addMonthlyRetProbsToTable();
    </script>
